name: Deploy to EC2 via AWS SSM

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Autenticación con AWS vía OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: github-actions

      # 2. Enviar el comando de despliegue a través de SSM Run Command
      - name: Execute Remote Commands via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:App,Values=fabrica_textil" \
            --comment "Despliegue automático desde GitHub Actions" \
            --parameters 'commands=[
              "cd /var/www/fabrica_textil",
              "sudo git fetch origin main",
              "sudo git reset --hard origin/main",
              "echo \"Despliegue completado con éxito\""
            ]' \
            --query "Command.CommandId" \
            --output text)
          
          echo "Comando SSM enviado con ID: $COMMAND_ID"
          
          # Opcional: Esperar a que el comando termine para ver si falló o no en GitHub
          echo "Esperando a que termine la ejecución..."
          aws ssm wait command-executed --command-id "$COMMAND_ID"